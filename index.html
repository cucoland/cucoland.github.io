	    background: #dfe6e9;

<div id="avisos">

        	<h2 style="color: #35bcde;">Cómo se juega</h2>

<script>
    let gridSize, roomCount;
    let firstMirrorPlaced = false; // Controla si ya se puso el primer espejo
    let rooms = []; 
    let userState = []; 
    let solution = [];
    let activepistass = [];
    let startTime;
    let records = { total: 0, count: 0 };
    let showingSolution = false;


const colors = [
    '#FFD1DC', '#BFFCC6', '#CFE9FF', '#FFFFD1', '#E0BBE4', 
    '#FFCCBB', '#C5E1A5', '#F48FB1', '#A7FFEB', '#fcbf7e', 
    '#D1C4E9', '#F8BBD0', '#DCEDC8', '#B2EBF2', '#F0F4C3'
];


function updateSlider(type) {
    const sizeInput = document.getElementById('in-size');
    const roomsInput = document.getElementById('in-rooms');
    const sizeVal = document.getElementById('val-size');
    const roomsVal = document.getElementById('val-rooms');

    if (type === 'size') {
        sizeVal.innerText = sizeInput.value;
        const newMax = parseInt(sizeInput.value) * 2;
        roomsInput.max = newMax;
        if (parseInt(roomsInput.value) > newMax) {
            roomsInput.value = newMax;
            roomsVal.innerText = newMax;
        }
    } else {
        roomsVal.innerText = roomsInput.value;
    }
}

function newPuzzle() {
    document.getElementById('grid').style.pointerEvents = 'auto';
    document.getElementById('aviso-win').style.display = 'none';
    document.getElementById('aviso-error').style.display = 'none';

    const msgInstrucciones = document.getElementById('aviso-instrucciones');
    if (msgInstrucciones) {
        msgInstrucciones.style.display = firstMirrorPlaced ? 'none' : 'block';
    }
    
    gridSize = parseInt(document.getElementById('in-size').value);
    roomCount = parseInt(document.getElementById('in-rooms').value);
    showingSolution = false;

    generateMap();
    if(!generateValidpistass()) {
        newPuzzle(); 
        return;
    }
    
    startTime = Date.now();
    draw();
}

    function generateMap() {
        rooms = Array(gridSize).fill().map(() => Array(gridSize).fill(-1));
        let seeds = [];
        for (let i = 0; i < roomCount; i++) {
            let x, y;
            do { x = Math.floor(Math.random()*gridSize); y = Math.floor(Math.random()*gridSize); } 
            while (rooms[y][x] !== -1);
            rooms[y][x] = i;
            seeds.push({x, y, id: i});
        }
        let total = roomCount;
        while (total < gridSize * gridSize) {
            let s = seeds[Math.floor(Math.random()*seeds.length)];
            let adj = [[0,1],[0,-1],[1,0],[-1,0]].map(d => ({x: s.x+d[0], y: s.y+d[1]}));
            let valid = adj.filter(n => n.x>=0 && n.x<gridSize && n.y>=0 && n.y<gridSize && rooms[n.y][n.x] === -1);
            if(valid.length > 0) {
                let pick = valid[Math.floor(Math.random()*valid.length)];
                rooms[pick.y][pick.x] = s.id;
                seeds.push({x: pick.x, y: pick.y, id: s.id});
                total++;
            }
        }
    }

function generateValidpistass() {
    solution = Array(gridSize).fill().map(() => Array(gridSize).fill(0));
    userState = Array(gridSize).fill().map(() => Array(gridSize).fill(0));
    
    for (let i = 0; i < roomCount; i++) {
        let cells = [];
        for(let y=0; y<gridSize; y++) 
            for(let x=0; x<gridSize; x++) if(rooms[y][x] === i) cells.push({x, y});
        let p = cells[Math.floor(Math.random()*cells.length)];
        solution[p.y][p.x] = Math.random() > 0.5 ? 1 : 2;
    }

    activepistass = [];
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let occupiedLabelSlots = new Set(); 

    for (let i = 0; i < roomCount; i++) {
        let found = false;
        let attempts = 0;
        while(!found && attempts < 1000) {
            let side = Math.floor(Math.random()*4);
            let pos = Math.floor(Math.random()*gridSize);
            let startKey = `${side}-${pos}`;

            if (occupiedLabelSlots.has(startKey)) {
                attempts++;
                continue;
            }

            let res = trace(side, pos, solution);
            let endKey = `${res.end.s}-${res.end.p}`;

            if (occupiedLabelSlots.has(endKey)) {
                attempts++;
                continue;
            }

            if(res.hits > 0 && res.path.some(pt => rooms[pt.y][pt.x] === i)) {
                res.id = chars[i % 26] + res.hits;
                activepistass.push(res);
                occupiedLabelSlots.add(startKey);
                occupiedLabelSlots.add(endKey);
                found = true;
            }
            attempts++;
        }
        if(!found) return false; 
    }
    return true;
}
    function trace(s, p, gridData) {
        let x, y, dx, dy;
        if(s===0){ x=p; y=0; dx=0; dy=1; }
        else if(s===1){ x=gridSize-1; y=p; dx=-1; dy=0; }
        else if(s===2){ x=p; y=gridSize-1; dx=0; dy=-1; }
        else { x=0; y=p; dx=1; dy=0; }

        let hits = 0;
        let path = [];
        let cx = x, cy = y;

        while(cx>=0 && cx<gridSize && cy>=0 && cy<gridSize) {
            path.push({x:cx, y:cy});
            let m = gridData[cy][cx];
            if(m === 1) { [dx, dy] = [-dy, -dx]; hits++; }
            else if(m === 2) { [dx, dy] = [dy, dx]; hits++; }
            cx += dx; cy += dy;
        }

        let exS, exP;
        if(cx<0){ exS=3; exP=cy; }
        else if(cx>=gridSize){ exS=1; exP=cy; }
        else if(cy<0){ exS=0; exP=cx; }
        else { exS=2; exP=cx; }

        return { start: {s, p}, end: {s: exS, p: exP}, hits, path };
    }

function draw() {
    const board = document.getElementById('grid');
    const availableWidth = window.innerWidth - 100; 
    const calculatedSize = Math.min(60, Math.floor(availableWidth / gridSize));
    document.documentElement.style.setProperty('--cell-size', `${calculatedSize}px`);

    board.style.gridTemplateColumns = `repeat(${gridSize}, var(--cell-size))`;
    board.innerHTML = '';

    for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.style.backgroundColor = colors[rooms[y][x] % colors.length];
            cell.onclick = () => handleClick(x, y);

            if(showingSolution && solution[y][x] > 0) {
                let s = document.createElement('div');
                s.className = `espejo-line sol-ghost ${solution[y][x]===1?'m-pos':'m-neg'}`;
                cell.appendChild(s);
            }

            if(userState[y][x] > 0) {
                let m = document.createElement('div');
                m.className = `espejo-line ${userState[y][x]===1?'m-pos':'m-neg'}`;
                cell.appendChild(m);
            }
            board.appendChild(cell);
        }
    }
    generarEtiquetas();
}

function generarEtiquetas() {
    document.querySelectorAll('.pistas').forEach(e => e.remove());
    const cont = document.getElementById('game-container');
    const cellSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-size'));
    const padding = 40; 

    activepistass.forEach(c => {
        // --- LÓGICA DE VALIDACIÓN ---
        // Trazamos el camino actual del usuario para esta pista específica
        let resActual = trace(c.start.s, c.start.p, userState);
        
        // Verificamos si el final y los rebotes coinciden con la pista original
        let esCorrecta = (resActual.end.s === c.end.s && 
                          resActual.end.p === c.end.p && 
                          resActual.hits === c.hits);
        // ----------------------------

        [c.start, c.end].forEach(pt => {
            let d = document.createElement('div');
            d.className = 'pistas';
            
            // Si es correcta, añadimos la clase CSS
            if (esCorrecta) {
                d.classList.add('correcta');
            }

            d.style.width = cellSize + 'px';
            d.style.height = cellSize + 'px';
            d.innerText = c.id;

            if(pt.s === 0) { d.style.top='0px'; d.style.left=(pt.p*cellSize + padding) + 'px'; }
            if(pt.s === 1) { d.style.right='0px'; d.style.top=(pt.p*cellSize + padding) + 'px'; }
            if(pt.s === 2) { d.style.bottom='0px'; d.style.left=(pt.p*cellSize + padding) + 'px'; }
            if(pt.s === 3) { d.style.left='0px'; d.style.top=(pt.p*cellSize + padding) + 'px'; }
            cont.appendChild(d);
        });
    });
}

function handleClick(x, y) {
// Si es el primer espejo que se pone, ocultamos el mensaje
    if (!firstMirrorPlaced) {
        firstMirrorPlaced = true;
        const msgInstrucciones = document.getElementById('aviso-instrucciones');
        if (msgInstrucciones) msgInstrucciones.style.display = 'none';
    }
    const rid = rooms[y][x];
    if(userState[y][x] === 0) {
        let exists = false;
        for(let r=0; r<gridSize; r++)
            for(let c=0; c<gridSize; c++)
                if(rooms[r][c] === rid && userState[r][c] > 0) exists = true;
        
        if(exists) { 
            document.getElementById('aviso-win').style.display = 'none'; 
            const err = document.getElementById('aviso-error');
            err.style.display = 'block';
            return; 
        }
    }
    cerrarError(); 
    userState[y][x] = (userState[y][x] + 1) % 3;
    draw();
    check();
}

function cerrarError() {
    document.getElementById('aviso-error').style.display = 'none';
}

function check() {
    let count = 0;
    for(let r=0; r<gridSize; r++)
        for(let c=0; c<gridSize; c++) if(userState[r][c] > 0) count++;
    
    if(count !== roomCount) return;

    let ok = activepistass.every(c => {
        let res = trace(c.start.s, c.start.p, userState);
        return res.end.s === c.end.s && res.end.p === c.end.p && res.hits === c.hits;
    });

    if(ok) {
        document.getElementById('aviso-error').style.display = 'none'; 
        let t = Math.floor((Date.now() - startTime) / 1000);
        records.count++; 
        records.total += t;
        document.getElementById('stat-avg').innerText = (records.total / records.count).toFixed(1);
        document.getElementById('stat-count').innerText = records.count;
        document.getElementById('solve-time').innerText = t;
        document.getElementById('aviso-win').style.display = 'block'; 
        document.getElementById('grid').style.pointerEvents = 'none';
    }
}
    function resetStats() { 
    // 1. Reiniciamos la lógica
    records = {total: 0, count: 0}; 
	firstMirrorPlaced = false; // Volvemos a marcar como que no hay espejos
    
    // 2. Actualizamos la pantalla (el DOM)
    document.getElementById('stat-avg').innerText = "0";
    document.getElementById('stat-count').innerText = "0";
    
    // 3. Generamos un nuevo puzzle
    newPuzzle(); 
    }
    function toggleSolution() { showingSolution = !showingSolution; draw(); }
function toggleFS() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.msRequestFullscreen) el.msRequestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.msExitFullscreen) document.msExitFullscreen();
    }
}
    function saveImage() {
        html2canvas(document.getElementById('game-container')).then(canvas => {
            const a = document.createElement('a');
            a.download = 'laser-maze.png'; a.href = canvas.toDataURL(); a.click();
        });
    }

function toggleNightMode() {
    const body = document.body;
    const btn = document.getElementById('bNocturno');
    
    body.classList.toggle('modo-nocturno');
    
    if (body.classList.contains('modo-nocturno')) {
        btn.innerText = "☀️";
        btn.style.background = "#fcf4c0"; // Color amarillento para el sol
        btn.style.boxShadow = "0 5px 0 #d4ac0d";
        btn.style.color = "#000";
    } else {
        btn.innerText = "🌙";
        btn.style.background = "#2c3e50";
        btn.style.boxShadow = "0 5px 0 #1a252f";
        btn.style.color = "#fff";
    }
}

window.onload = () => {
    updateSlider('size');
    updateSlider('rooms');
    newPuzzle();
};

</script>
